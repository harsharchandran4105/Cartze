name: cartze
description: "Supplies Shopping."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  english_words: ^4.0.0
  provider: ^6.1.5
  lottie: ^3.3.2
  google_fonts: ^8.0.0
  image_picker: ^1.2.1
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.7.7
  firebase_database: ^10.4.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lotties/
  fonts:
    - family: Margarine
      fonts:
        - asset: assets/fonts/Margarine-Regular.ttf
 
  
